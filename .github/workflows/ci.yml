# =============================================================================
# 工作流名称(显示在 GitHub Actions 页面上的标题）
# =============================================================================
name: Python CI

# =============================================================================
# 触发条件(定义什么时候自动运行这个工作流）
# =============================================================================
on:
  # 当代码被推送到以下分支时触发
  push:
    branches:
      - main      # 主分支(生产环境代码）
      - develop   # 开发分支(开发中的代码）

  # 当有人向以下分支发起 Pull Request 时触发
  pull_request:
    branches:
      - main      # PR 目标是 main 分支时触发
      - develop   # PR 目标是 develop 分支时触发

# =============================================================================
# 权限配置(定义工作流对仓库的访问权限）
# =============================================================================
permissions:
  contents: read   # 允许读取仓库内容(代码、配置等）
  pages: write     # 允许写入 GitHub Pages(用于部署覆盖率报告）
  id-token: write  # 允许使用 OIDC 身份验证(GitHub 推荐的安全认证方式）

# =============================================================================
# 并发控制(防止多个工作流同时运行造成冲突）
# =============================================================================
concurrency:
  group: pages     # 将所有部署 Pages 的工作流分到同一个组
  cancel-in-progress: false  # 不取消正在进行的部署(等待前一个完成再执行）
  # 如果设为 true，新的部署会立即取消旧的部署

# =============================================================================
# 任务定义(一个工作流可以包含多个 job）
# =============================================================================
jobs:
  # =============================================================================
  # Job 1: 代码检查 + 测试
  # =============================================================================
  lint-and-test:
    # 运行环境:使用 GitHub 提供的最新 Ubuntu 虚拟机
    runs-on: ubuntu-latest

    # 构建矩阵策略:用不同版本的 Python 分别运行，确保代码兼容性
    strategy:
      matrix:
        python-version:
          - "3.11"   # 第一个版本:Python 3.11
          - "3.12"   # 第二个版本:Python 3.12
        # 这会让整个 job 运行 2 次，每次用不同的 Python 版本

    # 任务中的具体步骤(按顺序执行）
    steps:
      # ---------------------------------------------------------------------------
      # 步骤 1:拉取代码
      # ---------------------------------------------------------------------------
      - name: Checkout
        # 使用 GitHub 官方的 checkout action(v5 版本）
        # 作用:将仓库代码克隆到虚拟机的当前工作目录
        uses: actions/checkout@v5

      # ---------------------------------------------------------------------------
      # 步骤 2:设置 Python 环境
      # ---------------------------------------------------------------------------
      - name: Setup Python
        # 使用 GitHub 官方的 setup-python action(v6 版本）
        # 作用:在虚拟机上安装指定版本的 Python
        uses: actions/setup-python@v6
        with:
          # 从矩阵变量获取 Python 版本号(第一次运行是 3.11，第二次是 3.12）
          python-version: ${{ matrix.python-version }}

      # ---------------------------------------------------------------------------
      # 步骤 3:安装 uv(快速的 Python 包管理器）
      # ---------------------------------------------------------------------------
      - name: Install uv
        # 使用 astral-sh 官方的 setup-uv action(v6 版本）
        # uv 是 pip 的现代替代品，速度更快(用 Rust 编写）
        uses: astral-sh/setup-uv@v6

      # ---------------------------------------------------------------------------
      # 步骤 4:启用缓存(加速后续构建）
      # ---------------------------------------------------------------------------
      - name: Enable cache
        # 使用 GitHub 官方的 cache action(v4 版本）
        # 作用:缓存依赖文件，下次运行时直接复用，不用重新下载
        uses: actions/cache@v4
        with:
          # 要缓存的目录路径(| 表示多行字符串）
          path: |
            ~/.cache/uv    # uv 的下载缓存目录
            .venv          # Python 虚拟环境目录
          # 缓存的键(用于标识缓存版本）
          # 格式:操作系统-Python版本-uv.lock文件哈希
          # 只要 uv.lock 不变，就复用同一份缓存
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          # 例如:Linux-py3.11-a1b2c3d4e5f6...

      # ---------------------------------------------------------------------------
      # 步骤 5:安装项目依赖
      # ---------------------------------------------------------------------------
      - name: Install dependencies
        # 执行 shell 命令(| 表示多行字符串）
        run: |
          # uv sync: 根据 pyproject.toml 和 uv.lock 安装所有依赖
          # --all-extras: 安装所有可选依赖组(包括 dev 组）
          # --dev: 明确指定安装开发依赖(pytest、flake8、black 等）
          uv sync --all-extras --dev

      # ---------------------------------------------------------------------------
      # 步骤 6:代码静态检查(Flake8）
      # ---------------------------------------------------------------------------
      - name: Flake8
        run: |
          # uv run: 在虚拟环境中执行命令
          # flake8: 检查代码中的语法错误、未使用的导入、风格问题
          # src tests: 检查 src 和 tests 两个目录
          uv run flake8 src tests

      # ---------------------------------------------------------------------------
      # 步骤 7:代码格式检查(Black）
      # ---------------------------------------------------------------------------
      - name: Black
        run: |
          # black --check: 只检查格式是否符合规范，不自动修改
          # 如果格式不符合，会报错并显示需要修改的地方
          uv run black --check src tests

      # ---------------------------------------------------------------------------
      # 步骤 8:Import 语句排序检查(isort）
      # ---------------------------------------------------------------------------
      - name: isort
        run: |
          # isort --check-only: 只检查 import 是否按规则排序，不自动修改
          # isort 会将 import 分为三组:标准库、第三方库、本地模块
          # 每组之间需要用空行分隔，组内按字母顺序排列
          uv run isort --check-only src tests

      # ---------------------------------------------------------------------------
      # 步骤 9:类型检查(Mypy）
      # ---------------------------------------------------------------------------
      - name: Mypy
        run: |
          # mypy: 静态类型检查工具，检查代码中的类型注解是否正确
          # 例如:def add(a: int, b: int) -> int: 中的 int 注解
          # 只检查 src 目录(测试代码通常不需要严格的类型检查）
          uv run mypy src

      # ---------------------------------------------------------------------------
      # 步骤 10:运行单元测试(Pytest）
      # ---------------------------------------------------------------------------
      - name: Pytest
        run: |
          # uv run pytest: 在虚拟环境中运行 pytest
          # --cov=src: 统计 src 目录的代码覆盖率(哪些代码被测试执行过）
          # --cov-report=xml: 生成 XML 格式的覆盖率报告(文件名为 coverage.xml）
          #   XML 格式是行业标准，可以被 Codecov、SonarQube 等工具解析
          # --cov-report=term-missing: 在终端显示覆盖率，并列出未覆盖的行号
          #   输出示例:src/calculator.py  10  2  80%  15-16
          # --cov-report=html: 生成 HTML 格式的覆盖率报告(htmlcov 目录）
          #   可以在浏览器打开 htmlcov/index.html 查看带颜色高亮的报告
          # --cov-fail-under=80: 如果覆盖率低于 80%，测试失败
          #   这是一种质量门槛，确保代码有足够的测试覆盖
          # -v: 详细模式，显示每个测试用例的名称和结果
          #   输出示例:tests/test_calculator.py::TestAdd::test_add_positive PASSED
          # uv run pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-report=html --cov-fail-under=80 -v
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=80 \
            -v
      # ---------------------------------------------------------------------------
      # 步骤 11:上传覆盖率报告(只在 Python 3.12 上执行）
      # ---------------------------------------------------------------------------
      - name: Upload coverage
        # 条件判断:只有当矩阵中当前版本是 3.12 时才执行此步骤
        # 避免重复上传 2 份相同的报告(3.11 和 3.12 各运行一次）
        if: matrix.python-version == '3.12'
        # 使用 GitHub 官方的上传 artifact action(v4 版本）
        # artifact 是工作流运行产生的文件，可以在 GitHub 页面上下载
        uses: actions/upload-artifact@v4
        with:
          # artifact 的名称(显示在 GitHub 页面上的名字）
          name: htmlcov
          # 要上传的文件路径(htmlcov 目录包含 HTML 报告的所有文件）
          path: htmlcov/
          # 保留时间（天），避免 artifact 堆积
          retention-days: 7

  # =============================================================================
  # Job 2: 部署覆盖率报告到 GitHub Pages
  # =============================================================================
  deploy-coverage:
    # 条件判断:只在 push 到 main 分支时部署
    # github.event_name == 'push': 触发事件是 push(不是 PR）
    # github.ref == 'refs/heads/main': 推送的目标分支是 main
    # 为什么不在 PR 时部署？因为 PR 的代码还没合并，不应该覆盖线上报告
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # 依赖关系:必须等 lint-and-test job 全部成功后才能执行
    needs:
      - lint-and-test

    # 运行环境
    runs-on: ubuntu-latest

    # 部署环境配置
    environment:
      name: github-pages   # 环境名称(可以在仓库 Settings → Environments 中看到）
      # 部署成功后会生成一个 URL，显示在 Actions 页面上
      # 例如:https://username.github.io/repo-name/
      url: ${{ steps.deployment.outputs.page_url }}

    # 部署步骤
    steps:
      # ---------------------------------------------------------------------------
      # 步骤 1:下载上一步生成的覆盖率报告
      # ---------------------------------------------------------------------------
      - name: Download coverage
        # 使用 GitHub 官方的下载 artifact action(v4 版本）
        # 从 lint-and-test job 中下载名为 htmlcov 的 artifact
        uses: actions/download-artifact@v4
        with:
          # artifact 名称(必须与上传时一致）
          name: htmlcov
          # 下载到本地哪个目录
          path: htmlcov

      # ---------------------------------------------------------------------------
      # 步骤 1.5:调试 - 检查下载的文件
      # ---------------------------------------------------------------------------
      - name: Debug - List downloaded files
        run: |
          # 显示下载的 htmlcov 目录内容
          echo "=== Downloaded files in htmlcov/ ==="
          ls -la htmlcov/

          # 检查 index.html 是否存在（这是 Pages 的入口文件）
          echo "=== Checking if index.html exists ==="
          if [ -f htmlcov/index.html ]; then
            echo "✅ index.html found"
            echo "File size: $(du -h htmlcov/index.html | cut -f1)"
          else
            echo "❌ index.html NOT found"
            echo "This is a critical error - deployment cannot continue"
            exit 1
          fi

      # ---------------------------------------------------------------------------
      # 步骤 2:配置 GitHub Pages 环境
      # ---------------------------------------------------------------------------
      - name: Setup Pages
        # 使用 GitHub 官方的 configure-pages action(v5 版本）
        # 作用:准备 GitHub Pages 的部署环境
        uses: actions/configure-pages@v5

      # ---------------------------------------------------------------------------
      # 步骤 3:打包 Pages 部署文件
      # ---------------------------------------------------------------------------
      - name: Upload Pages Artifact
        # 使用 GitHub 官方的 upload-pages-artifact action(v4 版本）
        # 作用:将要部署的文件打包成 artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # 要部署的目录(htmlcov 里的 index.html 就是首页）
          path: htmlcov

      # ---------------------------------------------------------------------------
      # 步骤 4:正式部署到 GitHub Pages
      # ---------------------------------------------------------------------------
      - name: Deploy
        # 给这个步骤一个 ID(用于在其他地方引用它的输出）
        id: deployment
        # 使用 GitHub 官方的 deploy-pages action(v4 版本）
        # 作用:将打包好的文件部署到 GitHub Pages
        uses: actions/deploy-pages@v4
        # 部署成功后，可以通过 environment.url 中定义的 page_url 访问
